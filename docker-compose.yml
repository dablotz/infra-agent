services:
  iac-agent:
    build:
      context: .
      dockerfile: Dockerfile
      platforms:
        - linux/amd64
    container_name: iac-agent-dev
    platform: linux/amd64
    volumes:
      - ~/.aws:/root/.aws:ro
      - .:/workspace
    environment:
      - AWS_PROFILE=${AWS_PROFILE:-default}
      - AWS_REGION=${AWS_REGION:-us-east-1}
    working_dir: /workspace
    stdin_open: true
    tty: true
