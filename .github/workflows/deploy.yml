name: Deploy

on:
  push:
    branches: [main]

# id-token: write is required for OIDC — GitHub mints a short-lived token that
# the job exchanges for temporary AWS credentials via sts:AssumeRoleWithWebIdentity.
# No long-lived AWS access keys are stored as secrets.
permissions:
  id-token: write
  contents: read

env:
  AWS_REGION: us-east-1

jobs:
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: cd agents/infra-agent && make test

  deploy:
    name: Deploy
    needs: unit-tests
    runs-on: ubuntu-latest

    outputs:
      agent_id: ${{ steps.outputs.outputs.agent_id }}
      alias_id: ${{ steps.outputs.outputs.alias_id }}

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          pip install -r requirements.txt
          pip install -r cdk/requirements-cdk.txt

      - name: Install Node.js (required by CDK CLI)
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install CDK CLI
        run: npm install -g aws-cdk

      # Build layers directly on the runner (already linux/amd64 — no Docker needed).
      # Lambda function packaging is handled by CDK via Code.from_asset.
      - name: Build Lambda layers
        run: cd agents/infra-agent && make build-layers

      - name: Deploy shared infrastructure
        run: |
          cd cdk
          cdk deploy SharedStack --require-approval never \
            -c github_repo=${{ vars.GH_REPO }}

      - name: Deploy infra-agent
        run: |
          cd cdk
          cdk deploy InfraAgentStack --require-approval never \
            --outputs-file /tmp/infra-outputs.json

      - name: Capture stack outputs
        id: outputs
        run: |
          python3 - <<'EOF'
          import json, os
          d = json.load(open('/tmp/infra-outputs.json'))['InfraAgentStack']
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"agent_id={d['AgentId']}\n")
              f.write(f"alias_id={d['AliasId']}\n")
          EOF

      # Post-deployment health check. CloudFormation handles rollback if the
      # stack update itself fails; this catches issues at the application level
      # and blocks the orchestrator deploy if the agent is not responding.
      - name: Smoke test
        run: |
          python scripts/smoke_test.py \
            --agent-id "${{ steps.outputs.outputs.agent_id }}" \
            --alias-id TSTALIASID \
            --region "${{ env.AWS_REGION }}"

      - name: Deploy orchestrator
        run: |
          cd cdk
          cdk deploy OrchestratorStack --require-approval never \
            --outputs-file /tmp/orchestrator-outputs.json \
            -c infra_agent_id="${{ steps.outputs.outputs.agent_id }}" \
            -c infra_agent_alias_id="${{ steps.outputs.outputs.alias_id }}"

      - name: Register collaborator and prepare orchestrator
        run: |
          ORCHESTRATOR_ID=$(python3 -c "
          import json
          d = json.load(open('/tmp/orchestrator-outputs.json'))
          print(d['OrchestratorStack']['OrchestratorAgentId'])
          ")
          python3 scripts/setup_orchestrator.py \
            --orchestrator-id "$ORCHESTRATOR_ID" \
            --region "${{ env.AWS_REGION }}"

  summary:
    name: Deployment Summary
    needs: deploy
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Print deployment result
        run: |
          echo "## Deployment Result" >> "$GITHUB_STEP_SUMMARY"
          echo "| | |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Agent ID | ${{ needs.deploy.outputs.agent_id }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Alias ID | ${{ needs.deploy.outputs.alias_id }} |" >> "$GITHUB_STEP_SUMMARY"
